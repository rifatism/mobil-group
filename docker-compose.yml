services:

  mysql:
    image: mysql:8.0
    container_name: cms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mobilservice123
      MYSQL_DATABASE: cms_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmobilservice123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./cms-backend-php
    container_name: cms-backend
    ports:
      - "8000:80"
    environment:
      DB_HOST: mysql
      DB_NAME: cms_db
      DB_USER: root
      DB_PASS: mobilservice123
      JWT_SECRET: mobilservice_super_secret_jwt_2024_change_in_prod
      JWT_EXPIRE: "604800"
      ALLOWED_ORIGIN: "http://localhost:8080"
    volumes:
      - ./cms-backend-php:/var/www/html
      - backend_uploads:/var/www/html/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: cms-frontend
    ports:
      - "8080:80"
    volumes:
      - ./src/frontend:/usr/share/nginx/html:ro

volumes:
  mysql_data:
  backend_uploads: