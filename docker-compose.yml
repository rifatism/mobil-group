services:
  mysql:
    image: mysql:8.0
    container_name: cms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mobilservice123
      MYSQL_DATABASE: cms_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmobilservice123"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    image: php:8.2-apache
    container_name: cms-php
    ports:
      - "8080:80"
    volumes:
      - ./src/frontend:/var/www/html
      - ./.env:/.env
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: