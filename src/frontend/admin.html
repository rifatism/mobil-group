<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель администратора — МобилСервис</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/images/logo.png" alt="МобилСервис" class="s-logo-img">
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item active" data-section="users" onclick="switchSection('users', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a7 7 0 0 1 7-7"/><circle cx="19" cy="11" r="3"/><path d="M17 21v-1a3 3 0 0 1 3-3"/></svg>
        Пользователи
      </a>
    </nav>

    <a class="sidebar-back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      На сайт
    </a>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="admin-main">

    <!-- Header -->
    <header class="admin-header">
      <div class="header-left">
        <h1 class="page-title" id="page-title">Пользователи</h1>
      </div>
      <div class="header-right">
        <button class="btn-header-add" onclick="openAddUser()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Добавить
        </button>

        <!-- User menu -->
        <div class="user-menu" id="user-menu">
          <button class="user-menu-trigger" onclick="toggleUserMenu(event)">
            <span class="user-avatar" id="user-avatar">A</span>
            <span class="user-name" id="user-name">Администратор</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="user-dropdown" id="user-dropdown">
            <div class="dropdown-profile">
              <span class="dropdown-avatar" id="dd-avatar">A</span>
              <div>
                <div class="dropdown-name" id="dd-name">Администратор</div>
                <div class="dropdown-email" id="dd-email">admin@mobilservice.ru</div>
                <span class="role-badge role-admin" id="dd-role">Администратор</span>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-logout" onclick="logout()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Выйти из системы
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="admin-content">

      <!-- ===== РАЗДЕЛ: ПОЛЬЗОВАТЕЛИ ===== -->
      <section id="section-users" class="content-section active">

        <div class="section-toolbar">
          <div class="filter-tabs">
            <button class="filter-tab active" data-role="all" onclick="setFilter('all', this)">
              Все <span class="tab-count" id="count-all">0</span>
            </button>
            <button class="filter-tab" data-role="admin" onclick="setFilter('admin', this)">
              Администраторы <span class="tab-count" id="count-admin">0</span>
            </button>
            <button class="filter-tab" data-role="employee" onclick="setFilter('employee', this)">
              Сотрудники <span class="tab-count" id="count-employee">0</span>
            </button>
            <button class="filter-tab" data-role="client" onclick="setFilter('client', this)">
              Клиенты <span class="tab-count" id="count-client">0</span>
            </button>
          </div>
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Поиск по имени или email..." oninput="renderTable()">
          </div>
        </div>

        <div class="table-wrap">
          <table class="users-table">
            <thead>
              <tr>
                <th>Пользователь</th>
                <th>E-mail</th>
                <th>Телефон</th>
                <th>Роль</th>
                <th>Дата регистрации</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr class="table-loader"><td colspan="6"><span class="loader"></span></td></tr>
            </tbody>
          </table>
        </div>

      </section>

    </main>
  </div>
</div>

<!-- ===== МОДАЛ ДОБАВЛЕНИЯ ПОЛЬЗОВАТЕЛЯ ===== -->
<div id="adduser-modal" class="modal-backdrop" onclick="backdropClick(event, 'adduser-modal')">
  <div class="modal-card">
    <button class="modal-close" onclick="closeAddUser()">&times;</button>
    <div class="modal-header">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
      </div>
      <h2 class="modal-title">Добавить пользователя</h2>
      <p class="modal-sub">Сотрудник или клиент МобилСервис</p>
    </div>
    <form id="adduser-form" class="modal-form" onsubmit="handleAddUser(event)">
      <div class="modal-row-2">
        <div class="modal-field">
          <label>Роль <span class="req">*</span></label>
          <select id="au-role" required>
            <option value="employee">Сотрудник</option>
            <option value="client">Клиент</option>
          </select>
        </div>
        <div class="modal-field">
          <label>Логин <span class="req">*</span></label>
          <input id="au-username" type="text" placeholder="username" required>
        </div>
      </div>
      <div class="modal-field">
        <label>Полное имя</label>
        <input id="au-fullname" type="text" placeholder="Иванов Иван Иванович">
      </div>
      <div class="modal-row-2">
        <div class="modal-field">
          <label>E-mail <span class="req">*</span></label>
          <input id="au-email" type="email" placeholder="email@example.com" required>
        </div>
        <div class="modal-field">
          <label>Телефон</label>
          <input id="au-phone" type="tel" placeholder="+7 (___) ___-__-__">
        </div>
      </div>
      <div class="modal-field">
        <label>Пароль <span class="req">*</span></label>
        <input id="au-password" type="password" placeholder="Минимум 6 символов" required minlength="6">
      </div>
      <p id="adduser-error" class="modal-msg modal-msg--error" hidden></p>
      <p id="adduser-success" class="modal-msg modal-msg--success" hidden></p>
      <button type="submit" id="adduser-submit" class="modal-btn">СОЗДАТЬ ПОЛЬЗОВАТЕЛЯ</button>
    </form>
  </div>
</div>

<!-- ===== ПОДТВЕРЖДЕНИЕ УДАЛЕНИЯ ===== -->
<div id="confirm-modal" class="modal-backdrop" onclick="backdropClick(event, 'confirm-modal')">
  <div class="modal-card modal-card--sm">
    <button class="modal-close" onclick="closeModal('confirm-modal')">&times;</button>
    <div class="modal-header">
      <div class="modal-icon modal-icon--danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
      <h2 class="modal-title">Удалить пользователя?</h2>
      <p class="modal-sub" id="confirm-text">Это действие нельзя отменить.</p>
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn--ghost" onclick="closeModal('confirm-modal')">Отмена</button>
      <button class="modal-btn modal-btn--danger" id="confirm-ok">Удалить</button>
    </div>
  </div>
</div>

<script src="assets/js/admin.js"></script>
</body>
</html>
