<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>База знаний — МобилСервис</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/profile.css">
  <link rel="stylesheet" href="assets/css/knowledge.css">
  <link rel="stylesheet" href="assets/css/notifications.css">
</head>
<body>

<!-- HEADER -->
<header class="p-header">
  <a href="index.html" class="p-site-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    На сайт
  </a>
  <div class="p-header-right">
    <div id="notif-bell-wrap"></div>
    <div class="p-user-menu" id="p-user-menu">
      <button class="p-user-trigger" onclick="toggleKbMenu(event)">
        <span class="p-avatar" id="p-avatar">?</span>
        <span class="p-username" id="p-username">Профиль</span>
        <svg class="p-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="p-dropdown" id="p-dropdown">
        <div class="p-dd-info">
          <span class="p-dd-avatar" id="p-dd-avatar">?</span>
          <div>
            <div class="p-dd-name" id="p-dd-name">—</div>
            <div class="p-dd-email" id="p-dd-email">—</div>
          </div>
        </div>
        <div class="p-dd-divider"></div>
        <a class="p-dd-item" href="profile.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Профиль
        </a>
        <a class="p-dd-item" href="dashboard.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Дашборд
        </a>
        <a class="p-dd-item p-dd-item--active" href="knowledge.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          База знаний
        </a>
        <div id="dd-admin-row" style="display:none">
          <a class="p-dd-item" href="admin.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Панель админа
          </a>
        </div>
        <div class="p-dd-divider"></div>
        <button class="p-dd-item p-dd-logout" onclick="kbLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Выйти
        </button>
      </div>
    </div>
  </div>
</header>

<!-- PAGE -->
<div class="kb-page">

  <!-- Page title -->
  <div class="kb-hero">
    <div class="kb-hero-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </div>
    <div>
      <h1 class="kb-hero-title">База знаний</h1>
      <p class="kb-hero-sub">Материалы компании, документы и обучающие тесты</p>
    </div>
  </div>

  <!-- ===== ТЕСТЫ ===== -->
  <section class="kb-section" id="kb-tests-section">
    <div class="kb-section-header">
      <h2 class="kb-section-title" id="kb-tests-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Тесты
      </h2>
    </div>
    <div id="kb-tests-grid" class="kb-tests-grid">
      <div class="kb-loading">
        <div class="kb-spinner"></div>
        Загрузка тестов...
      </div>
    </div>
  </section>

  <!-- Модал назначения теста (для admin на этой странице) -->
  <div id="kb-assign-modal" class="kb-modal-backdrop" onclick="closeKbAssignModal(event)">
    <div class="kb-modal-card" style="max-width:460px" onclick="event.stopPropagation()">
      <button class="kb-modal-close" onclick="closeKbAssignModal()">&times;</button>
      <h2 class="kb-modal-title" id="kb-assign-title">Назначить тест</h2>
      <p class="kb-assign-test-name" id="kb-assign-test-name"></p>
      <div class="kb-form-field">
        <label>Кому назначить</label>
        <select id="kb-assign-target" class="kb-form-select">
          <option value="all">Всем сотрудникам</option>
        </select>
      </div>
      <p id="kb-assign-error" class="kb-form-error" style="display:none"></p>
      <button class="kb-btn-primary" id="kb-assign-submit" onclick="handleKbAssign()">НАЗНАЧИТЬ</button>
    </div>
  </div>

  <!-- ===== ФАЙЛЫ ===== -->
  <section class="kb-section">
    <div class="kb-section-header">
      <h2 class="kb-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Файлы компании
      </h2>
      <div class="kb-section-actions">
        <button id="kb-mkdir-btn" class="kb-btn-mkdir" onclick="openKbMkdir()" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          Создать папку
        </button>
        <button id="kb-upload-btn" class="kb-btn-upload" onclick="openKbUpload()" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Загрузить файл
        </button>
      </div>
    </div>

    <!-- Хлебные крошки -->
    <nav id="kb-breadcrumb" class="kb-breadcrumb"></nav>

    <!-- Поиск файлов -->
    <div class="kb-search-row">
      <div class="kb-search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="kb-file-search" type="search" placeholder="Поиск файлов и папок..." oninput="renderFilesAndFolders()">
      </div>
    </div>

    <div id="kb-files-grid" class="kb-files-grid">
      <div class="kb-loading">
        <div class="kb-spinner"></div>
        Загрузка...
      </div>
    </div>
  </section>
</div>

<!-- ===== МОДАЛ ПРОХОЖДЕНИЯ ТЕСТА ===== -->
<div id="kb-test-modal" class="kb-modal-backdrop" onclick="if(event.target===this)closeTestModal()">
  <div class="kb-modal-card">
    <button class="kb-modal-close" onclick="closeTestModal()">×</button>
    <div id="kb-test-content"><!-- filled by JS --></div>
  </div>
</div>

<!-- ===== МОДАЛ СОЗДАНИЯ ПАПКИ ===== -->
<div id="kb-mkdir-modal" class="kb-modal-backdrop" onclick="if(event.target===this)closeKbMkdir()">
  <div class="kb-modal-card kb-modal-card--sm">
    <button class="kb-modal-close" onclick="closeKbMkdir()">×</button>
    <h3 class="kb-modal-title">Создать папку</h3>
    <form id="kb-mkdir-form" onsubmit="handleKbMkdir(event)">
      <div class="kb-form-field">
        <label>Название папки <span style="color:#e53935">*</span></label>
        <input id="kb-mkdir-name" type="text" placeholder="Название папки..." autocomplete="off">
      </div>
      <p id="kb-mkdir-error" class="kb-form-error" hidden></p>
      <button type="submit" id="kb-mkdir-submit" class="kb-btn-primary">СОЗДАТЬ</button>
    </form>
  </div>
</div>

<!-- ===== МОДАЛ ЗАГРУЗКИ ФАЙЛА (admin) ===== -->
<div id="kb-upload-modal" class="kb-modal-backdrop" onclick="if(event.target===this)closeKbUpload()">
  <div class="kb-modal-card kb-modal-card--sm">
    <button class="kb-modal-close" onclick="closeKbUpload()">×</button>
    <h3 class="kb-modal-title">Загрузить файл</h3>
    <form id="kb-upload-form" onsubmit="handleKbUpload(event)">
      <div class="kb-form-field">
        <label>Название</label>
        <input id="kbu-title" type="text" placeholder="Название документа">
      </div>
      <div class="kb-form-field">
        <label>Описание (необязательно)</label>
        <textarea id="kbu-desc" rows="2" placeholder="Краткое описание..."></textarea>
      </div>
      <div class="kb-form-field">
        <label>Файл <span style="color:#e53935">*</span></label>
        <input id="kbu-file" type="file" required>
      </div>
      <p id="kbu-error" class="kb-form-error" hidden></p>
      <button type="submit" id="kbu-submit" class="kb-btn-primary">ЗАГРУЗИТЬ</button>
    </form>
  </div>
</div>

<script src="assets/js/notifications.js"></script>
<script src="assets/js/knowledge.js"></script>
</body>
</html>
